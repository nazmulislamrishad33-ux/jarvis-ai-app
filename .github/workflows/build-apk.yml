name: Build Jarvis Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install npm dependencies
        working-directory: .
        run: npm install --legacy-peer-deps
        env:
          npm_config_yes: true

      - name: Install Expo CLI
        run: npm install -g @expo/cli eas-cli

      - name: Set server URL env
        run: |
          DOMAIN="${{ secrets.EXPO_PUBLIC_DOMAIN }}"
          if [ -z "$DOMAIN" ]; then
            DOMAIN="placeholder.replit.app"
          fi
          echo "EXPO_PUBLIC_DOMAIN=$DOMAIN" >> $GITHUB_ENV

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_DOMAIN: ${{ env.EXPO_PUBLIC_DOMAIN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Success message
        run: echo "✅ APK ready! Download from Artifacts section above."
