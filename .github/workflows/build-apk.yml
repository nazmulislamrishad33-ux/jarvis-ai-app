name: Build Jarvis Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      server_domain:
        description: "Your deployed Replit domain (e.g. myapp.replit.app)"
        required: false
        default: ""

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Expo public domain
        run: |
          DOMAIN="${{ github.event.inputs.server_domain }}"
          if [ -z "$DOMAIN" ]; then
            DOMAIN="${{ secrets.EXPO_PUBLIC_DOMAIN }}"
          fi
          echo "EXPO_PUBLIC_DOMAIN=$DOMAIN" >> $GITHUB_ENV

      - name: Expo Prebuild (generate native Android project)
        working-directory: artifacts/jarvis
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_DOMAIN: ${{ env.EXPO_PUBLIC_DOMAIN }}

      - name: Make gradlew executable
        working-directory: artifacts/jarvis/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/jarvis/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp artifacts/jarvis/android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/Jarvis-AI-v1.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-AI-APK
          path: apk-output/Jarvis-AI-v1.0.apk
          retention-days: 30

      - name: Print download instructions
        run: |
          echo "✅ APK build successful!"
          echo "📥 Download: Go to this GitHub Actions run → Artifacts section → Download 'Jarvis-AI-APK'"
          echo "📱 Install: Transfer to phone → tap APK → allow Unknown Sources → Install"
